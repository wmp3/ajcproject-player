<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AJC Project — Surprise Me</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0b0f;
      color: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }
    h1 { font-weight: 300; letter-spacing: 0.02em; margin: 0 0 2rem; }
    button {
      font-size: 1.25rem;
      padding: 0.9rem 2.5rem;
      border: 1px solid #f2f2f2;
      background: transparent;
      color: #f2f2f2;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    button:hover { background: #f2f2f2; color: #0b0b0f; }
    button:disabled { opacity: 0.4; cursor: wait; }
    #stage { width: min(900px, 100%); margin-top: 2.5rem; }
    #meta {
      display: none;
      margin-bottom: 1.5rem;
      line-height: 1.25;
    }
    #meta .artist { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 600; }
    #meta .line   { font-size: clamp(1.1rem, 2.2vw, 1.6rem); color: #bdbdbd; margin-top: 0.4rem; }
    #meta .track  { font-size: clamp(1rem, 1.6vw, 1.2rem); color: #888; margin-top: 0.6rem; font-style: italic; }
    #player { width: 100%; aspect-ratio: 16 / 7; border: 0; background: #000; }
    #error { color: #ff6b6b; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>aadam jacobs collection</h1>
  <button id="surprise">Surprise Me</button>
  <div id="stage">
    <div id="meta">
      <div class="artist"></div>
      <div class="line date"></div>
      <div class="line venue"></div>
      <div class="track"></div>
    </div>
    <iframe id="player" style="display:none" allow="autoplay" allowfullscreen></iframe>
    <div id="error"></div>
  </div>
<script>
const btn = document.getElementById('surprise');
const meta = document.getElementById('meta');
const player = document.getElementById('player');
const err = document.getElementById('error');

btn.addEventListener('click', async () => {
  btn.disabled = true;
  err.textContent = '';
  try {
    const r = await fetch('/api/random');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const t = await r.json();
    meta.querySelector('.artist').textContent = t.artist;
    meta.querySelector('.date').textContent   = t.date;
    meta.querySelector('.venue').textContent  = t.venue;
    meta.querySelector('.track').textContent  = t.track_title ? `♪ ${t.track_title}` : '';
    meta.style.display = 'block';
    player.src = t.embed_url;
    player.style.display = 'block';
  } catch (e) {
    err.textContent = `Could not load a track: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
