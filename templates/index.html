<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Aadam Jacobs Collection Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&family=Fira+Code&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --base: #FBFAF3;
      --contrast: #111111;
      --accent-1: #FFEE58;
      --accent-3: #503AA8;
      --accent-4: #686868;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--base);
      color: var(--contrast);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem calc(3rem + env(safe-area-inset-bottom));
      letter-spacing: -0.01em;
    }

    h1 {
      font-weight: 700;
      letter-spacing: -0.5px;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      margin: 0 0 2rem;
    }

    .logo {
      width: 100px;
      height: auto;
      margin-bottom: 1.25rem;
      display: block;
    }

    button {
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.85rem 2.25rem;
      border: 1.5px solid var(--contrast);
      background: var(--contrast);
      color: #ffffff;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 3px 3px 0 var(--contrast);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.5;
      cursor: wait;
      transform: none;
      box-shadow: none;
    }

    #stage {
      width: min(900px, 100%);
      margin-top: 2.5rem;
    }

    #meta {
      display: none;
      margin-bottom: 1.5rem;
      line-height: 1.15;
    }

    #meta .artist {
      font-size: clamp(2.25rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #meta .line {
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      color: var(--accent-4);
      margin-top: 0.5rem;
      font-weight: 400;
    }

    #meta .venue {
      color: var(--accent-3);
      font-weight: 600;
    }

    #meta .track {
      font-family: "Fira Code", ui-monospace, monospace;
      font-size: 0.95rem;
      color: var(--accent-4);
      margin-top: 0.9rem;
    }

    #player {
      width: 100%;
      margin-top: 0.5rem;
    }

    #details {
      display: block;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--accent-3);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      width: fit-content;
    }

    #details:hover {
      border-bottom-color: var(--accent-3);
    }

    #error {
      color: #b00020;
      margin-top: 1rem;
    }

    #player {
      height: 44px;
    }

    @media (max-width: 640px) {
      body {
        padding: 2rem 1.25rem calc(3rem + env(safe-area-inset-bottom));
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1.5rem;
      }

      button {
        font-size: 1.25rem;
        padding: 1rem 2.5rem;
      }

      #stage {
        margin-top: 2rem;
      }

      #meta .artist {
        font-size: 2.5rem;
      }

      #meta .line {
        font-size: 1.25rem;
      }

      #meta .track {
        font-size: 1.05rem;
      }

      #details {
        font-size: 1rem;
      }

      #player {
        height: 48px;
      }
    }
  </style>
</head>

<body>
  <a href="https://aadamjacobscollection.org/" target="_blank" rel="noopener">
    <img class="logo" src="https://aadamjacobscollection.org/wp-content/uploads/2025/03/cropped-ajc-logo.jpg"
      alt="A Mad Undertaking logo">
  </a>
  <h1>aadam jacobs collection</h1>
  <button id="surprise">Surprise Me</button>
  <div id="stage">
    <div id="meta">
      <div class="artist"></div>
      <div class="line date"></div>
      <div class="line venue"></div>
      <div class="track"></div>
    </div>
    <audio id="player" controls style="display:none"></audio>
    <a id="details" href="#" target="_blank" rel="noopener" style="display:none">View on archive.org →</a>
    <div id="error"></div>
  </div>
  <script>
    const btn = document.getElementById('surprise');
    const meta = document.getElementById('meta');
    const player = document.getElementById('player');
    const details = document.getElementById('details');
    const err = document.getElementById('error');

    async function loadRandom() {
      btn.disabled = true;
      err.textContent = '';
      try {
        const r = await fetch('/api/random', { cache: 'no-store' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const t = await r.json();
        console.log('random track:', t);
        meta.querySelector('.artist').textContent = t.artist;
        meta.querySelector('.date').textContent = t.date;
        meta.querySelector('.venue').textContent = t.venue;
        meta.querySelector('.track').textContent = t.track_title ? `♪ ${t.track_title}` : '';
        meta.style.display = 'block';
        player.pause();
        player.src = t.audio_url;
        player.load();
        player.style.display = 'block';
        player.play().catch(() => { });
        details.href = t.details_url;
        details.style.display = 'block';
      } catch (e) {
        err.textContent = `Could not load a track: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', loadRandom);
    player.addEventListener('ended', loadRandom);
  </script>
</body>

</html>
