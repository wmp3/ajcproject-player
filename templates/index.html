<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Aadam Jacobs Collection Player</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&family=Fira+Code&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --base: #FBFAF3;
      --contrast: #111111;
      --accent-1: #FFEE58;
      --accent-3: #503AA8;
      --accent-4: #686868;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--base);
      color: var(--contrast);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem calc(3rem + env(safe-area-inset-bottom));
      letter-spacing: -0.01em;
    }

    h1 {
      font-weight: 700;
      letter-spacing: -0.5px;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      margin: 0 0 2rem;
      text-align: center;
    }

    .logo {
      width: 100px;
      height: auto;
      margin-bottom: 1.25rem;
      display: block;
    }

    button {
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.85rem 2.25rem;
      border: 1.5px solid var(--contrast);
      background: var(--contrast);
      color: #ffffff;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 3px 3px 0 var(--contrast);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.5;
      cursor: wait;
      transform: none;
      box-shadow: none;
    }

    #stage {
      width: min(900px, 100%);
      margin-top: 2.5rem;
    }

    #meta {
      display: none;
      margin-bottom: 1.5rem;
      line-height: 1.15;
    }

    #meta .artist {
      font-size: clamp(2.25rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #meta .line {
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      color: var(--accent-4);
      margin-top: 0.5rem;
      font-weight: 400;
    }

    #meta .venue {
      color: var(--contrast);
      font-weight: 600;
    }

    #meta .track {
      font-family: "Fira Code", ui-monospace, monospace;
      font-size: 0.95rem;
      color: var(--accent-4);
      margin-top: 0.9rem;
    }

    #filters {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .filter-group {
      text-align: center;
    }

    .filter-caption {
      font-size: 0.8rem;
      color: var(--accent-4);
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 0.05rem;
    }

    .date-range {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }

    .date-range label {
      display: flex;
      flex-direction: column;
      font-size: 0.75rem;
      color: var(--accent-4);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .date-range input[type="date"],
    #venue-input,
    #creator-input {
      font-family: inherit;
      font-size: 1rem;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid var(--contrast);
      border-radius: 8px;
      background: var(--base);
      color: var(--contrast);
      margin-top: 0.3rem;
    }

    #venue-input,
    #creator-input {
      min-width: 260px;
      max-width: 100%;
    }

    #player {
      width: 100%;
      margin-top: 0.5rem;
    }

    #details {
      display: block;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--accent-3);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      width: fit-content;
    }

    #details:hover {
      border-bottom-color: var(--accent-3);
    }

    #error {
      color: #b00020;
      margin-top: 1rem;
    }

    #player {
      height: 44px;
    }

    @media (max-width: 640px) {
      body {
        padding: 2rem 1.25rem calc(3rem + env(safe-area-inset-bottom));
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1.5rem;
      }

      button {
        font-size: 1.25rem;
        padding: 1rem 2.5rem;
      }

      #stage {
        margin-top: 2rem;
      }

      #meta .artist {
        font-size: 2.5rem;
      }

      #meta .line {
        font-size: 1.25rem;
      }

      #meta .track {
        font-size: 1.05rem;
      }

      #details {
        font-size: 1rem;
      }

      #player {
        height: 48px;
      }

      .venue-label {
        display: block;
        width: 100%;
      }

      #venue-input,
      #creator-input {
        min-width: 0;
        width: 100%;
        font-size: 0.85rem;
        padding: 0.5rem 0.6rem;
      }

      .filter-group {
        width: 100%;
        max-width: 340px;
      }
    }
  </style>
</head>

<body>
  <a href="https://aadamjacobscollection.org/" target="_blank" rel="noopener">
    <img class="logo" src="{{ url_for('static', filename='ajc-logo.jpg') }}"
      alt="A Mad Undertaking logo">
  </a>
  <h1>aadam jacobs collection</h1>
  <div id="filters">
    <div class="filter-group">
      <label class="venue-label">
        <input type="text" id="creator-input" list="creator-options" placeholder="All creators — search to filter" autocomplete="off">
        <datalist id="creator-options"></datalist>
      </label>
    </div>
    <div class="filter-group">
      <label class="venue-label">
        <input type="text" id="venue-input" list="venue-options" placeholder="All venues — search to filter" autocomplete="off">
        <datalist id="venue-options"></datalist>
      </label>
    </div>
    <div class="filter-group">
      <div class="filter-caption">Publication Date</div>
      <div class="date-range">
        <label>From
          <input type="date" id="start-date">
        </label>
        <label>To
          <input type="date" id="end-date">
        </label>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-caption">Added Date</div>
      <div class="date-range">
        <label>From
          <input type="date" id="added-start-date">
        </label>
        <label>To
          <input type="date" id="added-end-date">
        </label>
      </div>
    </div>
  </div>
  <button id="surprise">Surprise Me</button>
  <div id="stage">
    <div id="meta">
      <div class="artist"></div>
      <div class="line venue"></div>
      <div class="line date"></div>
      <div class="track"></div>
    </div>
    <audio id="player" controls style="display:none"></audio>
    <a id="details" href="#" target="_blank" rel="noopener" style="display:none">View on archive.org →</a>
    <div id="error"></div>
  </div>
  <script>
    const btn = document.getElementById('surprise');
    const meta = document.getElementById('meta');
    const player = document.getElementById('player');
    const details = document.getElementById('details');
    const err = document.getElementById('error');
    const startInput = document.getElementById('start-date');
    const endInput = document.getElementById('end-date');
    const addedStartInput = document.getElementById('added-start-date');
    const addedEndInput = document.getElementById('added-end-date');
    const venueInput = document.getElementById('venue-input');
    const venueOptions = document.getElementById('venue-options');
    const creatorInput = document.getElementById('creator-input');
    const creatorOptions = document.getElementById('creator-options');

    async function loadList(url, key, datalistEl) {
      try {
        const r = await fetch(url, { cache: 'no-store' });
        if (!r.ok) return;
        const data = await r.json();
        for (const v of data[key]) {
          const opt = document.createElement('option');
          opt.value = v;
          datalistEl.appendChild(opt);
        }
      } catch { }
    }

    function applyBounds(fromInput, toInput, bounds) {
      if (!bounds) return;
      const { min_date, max_date } = bounds;
      if (min_date) {
        fromInput.min = min_date;
        fromInput.max = max_date;
        fromInput.value = min_date;
      }
      if (max_date) {
        toInput.min = min_date;
        toInput.max = max_date;
        toInput.value = max_date;
      }
    }

    async function loadBounds() {
      try {
        const r = await fetch('/api/bounds', { cache: 'no-store' });
        if (!r.ok) return;
        const { publication, added } = await r.json();
        applyBounds(startInput, endInput, publication);
        applyBounds(addedStartInput, addedEndInput, added);
      } catch { }
    }

    async function loadRandom() {
      btn.disabled = true;
      err.textContent = '';
      try {
        const params = new URLSearchParams();
        if (startInput.value) params.set('start', startInput.value);
        if (endInput.value) params.set('end', endInput.value);
        if (addedStartInput.value) params.set('added_start', addedStartInput.value);
        if (addedEndInput.value) params.set('added_end', addedEndInput.value);
        if (venueInput.value.trim()) params.set('venue', venueInput.value.trim());
        if (creatorInput.value.trim()) params.set('creator', creatorInput.value.trim());
        const qs = params.toString();
        const r = await fetch(`/api/random${qs ? '?' + qs : ''}`, { cache: 'no-store' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const t = await r.json();
        console.log('random track:', t);
        meta.querySelector('.artist').textContent = t.artist;
        meta.querySelector('.date').textContent = t.date;
        meta.querySelector('.venue').textContent = t.venue;
        meta.querySelector('.track').textContent = t.track_title ? `♪ ${t.track_title}` : '';
        meta.style.display = 'block';
        player.pause();
        player.src = t.audio_url;
        player.load();
        player.style.display = 'block';
        player.play().catch(() => { });
        details.href = t.details_url;
        details.style.display = 'block';
      } catch (e) {
        err.textContent = `Could not load a track: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', loadRandom);
    player.addEventListener('ended', loadRandom);
    loadBounds();
    loadList('/api/venues', 'venues', venueOptions);
    loadList('/api/creators', 'creators', creatorOptions);
  </script>
</body>

</html>
